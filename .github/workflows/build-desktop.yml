name: Build desktop apps

# Builds installers for every OS on its OWN native runner (the reliable way —
# Prisma ships a per-platform native engine, so cross-building is unreliable).
# Trigger: push a version tag (e.g. v0.1.0) → all installers attach to a GitHub
# Release. Or run manually (workflow_dispatch) to get them as artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to attach installers to a Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon (M1–M4)
            artifact: "release/*.dmg"
          - os: macos-13 # Intel Macs
            artifact: "release/*.dmg"
          - os: windows-latest
            artifact: "release/*.exe"
          - os: ubuntu-latest
            artifact: "release/*.AppImage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist
        env:
          # No signing certs in CI yet → build unsigned. (Mac notarization is a
          # later step once an Apple Developer cert is added as a secret.)
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload as workflow artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-installer
          path: ${{ matrix.artifact }}
          if-no-files-found: warn

      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
